<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --orange: #FF6600;
  --orange-dark: #E55A28;
  --accent: #FFB800;
  --dark: #1a1410;
  --gray: #7F756F;
}
body {
  width: 1216px; height: 640px;
  background: linear-gradient(135deg, #14100c 0%, #1a1410 55%, #241405 100%);
  font-family: 'Inter', system-ui, sans-serif;
  color: #fff; overflow: hidden; position: relative;
}
.grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,102,0,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,102,0,0.045) 1px, transparent 1px);
  background-size: 56px 56px;
  transform: perspective(600px) rotateX(20deg) scaleY(1.2);
  transform-origin: bottom center;
}
.glow {
  position: absolute; width: 640px; height: 640px;
  background: radial-gradient(circle, rgba(255,102,0,0.15) 0%, transparent 70%);
  top: -170px; left: -130px;
}
.glow-2 {
  position: absolute; width: 460px; height: 460px;
  background: radial-gradient(circle, rgba(255,184,0,0.10) 0%, transparent 70%);
  bottom: -120px; right: -80px;
}
.content {
  position: relative; z-index: 10;
  padding: 42px 70px 78px; height: 100%;
  display: flex; flex-direction: column;
}
.top { display: flex; justify-content: space-between; align-items: center; }
.cat-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,102,0,0.08);
  border: 1px solid var(--orange);
  padding: 9px 18px; border-radius: 8px;
  font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
  font-weight: 600; color: var(--orange);
}
.cat-badge::before {
  content:''; width:8px; height:8px; background:var(--orange); border-radius:50%;
  box-shadow: 0 0 12px var(--orange);
}
.meta-badge {
  font-size: 12px; letter-spacing: 2px; font-weight: 600;
  padding: 8px 16px; background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.55); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; text-transform: uppercase;
}
.versus {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px; text-align: center;
}
.term {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 96px; line-height: 0.92; letter-spacing: 1px;
  color: #fff; text-shadow: 0 0 44px rgba(255,102,0,0.35);
  max-width: 1080px;
}
.vs {
  font-family: 'Bebas Neue', Impact, sans-serif;
  font-size: 44px; letter-spacing: 3px; margin: 4px 0;
  background: linear-gradient(90deg, var(--orange), var(--accent), var(--orange));
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
}
.subtitle {
  margin-top: 26px; font-size: 22px; font-weight: 400;
  color: rgba(255,255,255,0.65); letter-spacing: 0.3px;
}
.footer {
  position: absolute; bottom: 0; left: 0; right: 0; height: 46px;
  background: rgba(15,11,8,0.96);
  border-top: 1px solid rgba(255,102,0,0.25);
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 70px; z-index: 100;
}
.footer-left {
  font-size: 13px; color: var(--orange); letter-spacing: 1.5px; text-transform: uppercase;
  font-weight: 700;
}
.footer-right {
  font-size: 12px; color: rgba(255,255,255,0.35); letter-spacing: 0.5px;
}
.accent-line {
  position: absolute; bottom: 46px; left: 0; height: 3px; width: 32%;
  background: linear-gradient(90deg, var(--orange) 0%, var(--accent) 60%, transparent 100%);
}
</style></head>
<body>
<div class="grid"></div>
<div class="glow"></div>
<div class="glow-2"></div>
<div class="content">
  <div class="top">
    <div class="cat-badge">GLOSARIO · COMPARACIÓN</div>
    <div class="meta-badge">__META_BADGE__</div>
  </div>
  <div class="versus">
    <div class="term">__TERM_A__</div>
    <div class="vs">VS</div>
    <div class="term">__TERM_B__</div>
    <p class="subtitle">__SUBTITLE__</p>
  </div>
</div>
<div class="accent-line"></div>
<div class="footer">
  <span class="footer-left">Ecosistema Startup</span>
  <span class="footer-right">cristiantala.com</span>
</div>
</body></html>
